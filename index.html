<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>이맛저맛 | 현장 출석체크</title>

<!-- 폰트 및 라이브러리 -->
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
  theme: {
    extend: {
      fontFamily: { sans: ['Pretendard', 'sans-serif'] },
      colors: {
        brand: {
          light: '#FFF5E1',
          DEFAULT: '#FF6B00', // 쨍하고 강렬한 오렌지
          yellow: '#FFD600',  // 포인트 옐로우
          dark: '#1A1A1A',    // 굵은 선을 위한 찐블랙
        }
      },
      boxShadow: {
        'brutal': '6px 6px 0px 0px rgba(26,26,26,1)',
        'brutal-sm': '3px 3px 0px 0px rgba(26,26,26,1)',
        'brutal-hover': '2px 2px 0px 0px rgba(26,26,26,1)',
      }
    }
  }
}
</script>
<style>
  body { 
    background-color: #FDF9F1; /* 따뜻한 아이보리 계열 배경 */
    /* 도트 패턴 배경 추가 */
    background-image: radial-gradient(#FF6B00 1px, transparent 1px);
    background-size: 24px 24px;
    background-attachment: fixed;
    color: #1A1A1A; 
    -webkit-font-smoothing: antialiased; 
    word-break: keep-all; 
    letter-spacing: -0.02em; 
  }
  
  /* 커스텀 스크롤바 등 텍스트 선택 색상 */
  ::selection { background-color: #1A1A1A; color: #FFD600; }

  /* 네오브루탈리즘 입력창 애니메이션 */
  .input-brutal {
    transition: all 0.15s ease-in-out;
  }
  .input-brutal:focus {
    transform: translate(3px, 3px);
    box-shadow: 2px 2px 0px 0px rgba(26,26,26,1);
    outline: none;
  }

  /* 네오브루탈리즘 버튼 애니메이션 */
  .btn-brutal {
    transition: all 0.1s ease-in-out;
  }
  .btn-brutal:active, .btn-brutal.loading {
    transform: translate(4px, 4px);
    box-shadow: 0px 0px 0px 0px rgba(26,26,26,1) !important;
  }

  .loader { 
    border: 3px solid rgba(26,26,26,0.3); 
    border-radius: 50%; 
    border-top: 3px solid #1A1A1A; 
    width: 24px; 
    height: 24px; 
    animation: spin 0.8s linear infinite; 
    display: none; 
  }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
</style>
</head>
<body class="pb-20 h-screen flex flex-col">

<!-- 네비게이션 바 -->
<nav class="w-full bg-white border-b-4 border-brand-dark sticky top-0 z-50 shadow-brutal-sm">
  <div class="max-w-3xl mx-auto px-6 h-16 flex items-center justify-center relative">
    <a href="#" class="font-black text-3xl flex items-center gap-2 transform -rotate-2 hover:rotate-0 transition-transform">
      <i class="fa-solid fa-utensils text-brand text-2xl"></i>
      <span class="text-brand-dark tracking-tighter">이맛<span class="text-brand">저맛</span></span>
    </a>
  </div>
</nav>

<!-- 메인 콘텐츠 -->
<main class="max-w-xl mx-auto px-6 pt-12 flex-1 flex flex-col justify-center w-full mt-[-64px]">
  
  <!-- 메인 박스 -->
  <div class="bg-white border-4 border-brand-dark rounded-2xl p-8 shadow-brutal relative">
    
    <!-- 장식용 뱃지 -->
    <div class="absolute -top-5 -right-5 bg-brand-yellow border-4 border-brand-dark rounded-full w-20 h-20 flex items-center justify-center shadow-brutal transform rotate-12 z-10">
      <span class="font-black text-brand-dark text-lg leading-tight text-center">TICKET<br>🎟️</span>
    </div>

    <div class="mb-8">
      <div class="inline-block px-4 py-2 mb-4 bg-brand border-4 border-brand-dark font-black text-white text-sm tracking-widest uppercase transform -skew-x-6">
        Check-in
      </div>
      <h1 class="text-4xl md:text-5xl font-black mb-2 text-brand-dark tracking-tight">출석 체크</h1>
      <p class="text-gray-700 font-bold text-sm md:text-base border-b-4 border-brand-yellow pb-2 inline-block">현장 입장을 위해 이름을 입력해 주세요!</p>
    </div>

    <div class="space-y-6">
      <div>
        <label class="block text-xl font-black text-brand-dark mb-3" for="userName">이름 <span class="text-brand text-2xl">*</span></label>
        <input type="text" id="userName" placeholder="예: 홍길동" class="w-full bg-brand-light border-4 border-brand-dark rounded-xl p-4 text-2xl text-center font-black text-brand-dark placeholder-gray-400 shadow-brutal input-brutal" onkeypress="if(event.key === 'Enter') checkAttendance()">
      </div>
    </div>

    <button type="button" onclick="checkAttendance()" id="submitBtn" class="w-full py-5 bg-brand border-4 border-brand-dark text-brand-dark font-black text-2xl rounded-xl shadow-brutal btn-brutal flex items-center justify-center gap-3 mt-8">
      <span id="btnText">입장 확인하기!</span>
      <div id="btnLoader" class="loader"></div>
    </button>
  </div>
  
</main>

<!-- 결과 모달 (팝업창) -->
<div id="resultModal" class="fixed inset-0 z-[100] hidden items-center justify-center bg-brand-dark/80 backdrop-blur-sm px-4 opacity-0 transition-opacity duration-300">
  <!-- 모달 컨텐츠 컨테이너 -->
  <div class="bg-white border-4 border-brand-dark rounded-2xl p-6 md:p-8 max-w-sm w-full shadow-[12px_12px_0_0_rgba(255,107,0,1)] transform transition-all scale-95 duration-300 relative" id="modalContent">
    
    <!-- 닫기 버튼 (X 아이콘) -->
    <button onclick="closeModal()" class="absolute -top-4 -right-4 bg-white border-4 border-brand-dark rounded-full w-12 h-12 flex items-center justify-center shadow-brutal hover:bg-gray-100 btn-brutal z-10">
      <i class="fa-solid fa-xmark text-2xl font-black text-brand-dark"></i>
    </button>

    <!-- 아이콘 영역 (JS에서 동적 변경) -->
    <div id="modalIconBox" class="w-20 h-20 bg-brand-yellow border-4 border-brand-dark rounded-full flex items-center justify-center mb-6 shadow-brutal transform -rotate-6">
      <i id="modalIcon" class="fa-solid fa-face-smile text-4xl text-brand-dark"></i>
    </div>
    
    <h3 id="modalTitle" class="text-3xl font-black text-brand-dark mb-3">환영합니다!</h3>
    <p id="modalMessage" class="text-gray-800 font-bold text-base mb-6 leading-relaxed bg-brand-light p-3 border-2 border-brand-dark rounded-lg">
      테이블에 이름표가 있으니 이름표대로 앉아주세요.
    </p>
    
    <!-- 팀 및 음료 안내 박스 -->
    <div id="infoBox" class="flex flex-col gap-4 mb-2 hidden">
      <!-- 팀 박스 -->
      <div class="bg-brand border-4 border-brand-dark rounded-xl p-4 flex items-center justify-between shadow-brutal-sm">
        <span class="font-black text-brand-dark text-lg">🎯 배정 팀</span>
        <span class="text-3xl font-black text-white px-3 py-1 bg-brand-dark rounded-lg transform rotate-2"><span id="teamNumberDisplay"></span>팀</span>
      </div>
      <!-- 음료 박스 -->
      <div class="bg-brand-yellow border-4 border-brand-dark rounded-xl p-4 flex items-center justify-between shadow-brutal-sm">
        <span class="font-black text-brand-dark text-lg">🥤 음료</span>
        <span class="text-xl font-black text-brand-dark text-right break-keep" id="beverageDisplay"></span>
      </div>
    </div>
    
    <!-- 에러 시 닫기 버튼 (JS에서 동적 표시) -->
    <button type="button" onclick="closeModal()" id="closeModalBtn" class="w-full mt-6 py-4 bg-brand-dark text-white font-black text-xl rounded-xl shadow-brutal btn-brutal flex items-center justify-center gap-2 hidden">
      다시 입력하기
    </button>
  </div>
</div>

<script>
  async function checkAttendance() {
    const nameInput = document.getElementById('userName').value.trim();
    const submitBtn = document.getElementById('submitBtn');
    const btnText = document.getElementById('btnText');
    const btnLoader = document.getElementById('btnLoader');

    if (!nameInput) {
        alert("이름을 입력해주세요!");
        document.getElementById('userName').focus();
        return;
    }

    submitBtn.disabled = true;
    submitBtn.classList.add('loading');
    btnText.innerText = '확인 중...';
    btnLoader.style.display = 'block';

    try {
        const response = await fetch('/api/check-attendance', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name: nameInput })
        });

        const data = await response.json();

        if (response.ok && data.success) {
            showModal(true, nameInput, data.team, data.beverage);
        } else {
            showModal(false, nameInput, null, null);
        }
    } catch (error) {
        // 프리뷰 창 테스트용
        if(nameInput === '테스트') {
            showModal(true, nameInput, "14", "아이스 아메리카노");
        } else {
            showModal(false, nameInput, null, null);
        }
    } finally {
        submitBtn.disabled = false;
        submitBtn.classList.remove('loading');
        btnText.innerText = '입장 확인하기!';
        btnLoader.style.display = 'none';
        document.getElementById('userName').value = '';
    }
  }

  function showModal(isSuccess, name, team, beverage) {
    const modal = document.getElementById('resultModal');
    const content = document.getElementById('modalContent');
    const iconBox = document.getElementById('modalIconBox');
    const icon = document.getElementById('modalIcon');
    const title = document.getElementById('modalTitle');
    const message = document.getElementById('modalMessage');
    const infoBox = document.getElementById('infoBox');
    const teamDisplay = document.getElementById('teamNumberDisplay');
    const beverageDisplay = document.getElementById('beverageDisplay');
    const closeBtn = document.getElementById('closeModalBtn');

    if (isSuccess) {
        // 성공 스타일
        content.classList.replace('shadow-[12px_12px_0_0_rgba(255,0,0,1)]', 'shadow-[12px_12px_0_0_rgba(255,107,0,1)]');
        iconBox.className = "w-20 h-20 bg-brand-yellow border-4 border-brand-dark rounded-full flex items-center justify-center mb-6 shadow-brutal transform -rotate-6";
        icon.className = "fa-solid fa-face-smile text-4xl text-brand-dark";
        title.innerText = `${name}님 환영합니다!`;
        message.innerText = "테이블에 이름표가 있으니 이름표대로 앉아주세요.";
        message.className = "text-gray-800 font-bold text-base mb-6 leading-relaxed bg-brand-light p-3 border-2 border-brand-dark rounded-lg";
        infoBox.classList.remove('hidden');
        teamDisplay.innerText = team;
        beverageDisplay.innerText = beverage || '미선택';
        closeBtn.classList.add('hidden'); // 성공시 상단 X 버튼만 사용
    } else {
        // 실패 스타일
        content.classList.replace('shadow-[12px_12px_0_0_rgba(255,107,0,1)]', 'shadow-[12px_12px_0_0_rgba(255,0,0,1)]');
        iconBox.className = "w-20 h-20 bg-[#FF3B30] border-4 border-brand-dark rounded-full flex items-center justify-center mb-6 shadow-brutal transform rotate-6";
        icon.className = "fa-solid fa-circle-exclamation text-4xl text-white";
        title.innerText = "확인 불가";
        message.innerHTML = `<span class="font-black text-[#FF3B30] text-xl">'${name}'</span> 님의<br>사전 신청 내역을 찾을 수 없습니다.<br><br>오타가 없는지 확인하시거나 현장 스태프에게 문의해 주세요.`;
        message.className = "text-gray-800 font-bold text-base mb-6 leading-relaxed bg-gray-100 p-4 border-2 border-brand-dark rounded-lg";
        infoBox.classList.add('hidden');
        closeBtn.classList.remove('hidden'); // 에러시 하단 버튼 표시
    }

    modal.classList.remove('hidden');
    modal.classList.add('flex');
    setTimeout(() => {
      modal.classList.remove('opacity-0');
      modal.classList.add('opacity-100');
      content.classList.remove('scale-95');
      content.classList.add('scale-100');
    }, 10);
  }

  function closeModal() {
    const modal = document.getElementById('resultModal');
    const content = document.getElementById('modalContent');
    
    modal.classList.remove('opacity-100');
    modal.classList.add('opacity-0');
    content.classList.remove('scale-100');
    content.classList.add('scale-95');
    
    setTimeout(() => {
      modal.classList.add('hidden');
      modal.classList.remove('flex');
      document.getElementById('userName').focus();
    }, 300);
  }
</script>
</body>
</html>
